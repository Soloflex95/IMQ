version: '3.8'

services:
  imq-web:
    build:
      context: .
      dockerfile: src/IMQ.Web/Dockerfile
    ports:
      - "5001:80"
      - "5443:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=IMQ;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
    depends_on:
      - sql-server
    networks:
      - imq-network

  imq-api:
    build:
      context: .
      dockerfile: src/IMQ.Api/Dockerfile
    ports:
      - "5002:80"
      - "5444:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ConnectionStrings__DefaultConnection=Server=sql-server;Database=IMQ;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True
    depends_on:
      - sql-server
    networks:
      - imq-network

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    networks:
      - imq-network

networks:
  imq-network:
    driver: bridge

volumes:
  sqldata:
